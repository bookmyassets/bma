name: Deploy Next.js

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_TELECRM_API_KEY: ${{ secrets.NEXT_PUBLIC_TELECRM_API_KEY }}
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
          RECAPTCHA_PROJECT_ID: ${{ secrets.RECAPTCHA_PROJECT_ID }}
          RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          SITE_NAME: ${{ secrets.SITE_NAME }}
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_CLOUD_API_KEY: ${{ secrets.GOOGLE_CLOUD_API_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}

      - name: Prepare standalone output
        run: |
          mkdir -p .next/standalone/.next

          rm -rf .next/standalone/.next/static
          cp -r .next/static .next/standalone/.next/static

          rm -rf .next/standalone/public
          mkdir -p .next/standalone/public
          cp -r public/. .next/standalone/public/

      - name: Archive build output
        run: tar -czf app.tar.gz .next/standalone package.json

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "app.tar.gz"
          target: "/var/www/bma"
          overwrite: true

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd /var/www/bma

            rm -rf .next/standalone/public

            tar -xzf app.tar.gz

            pm2 delete app || true

            HOSTNAME=127.0.0.1 PORT=3000 pm2 restart bma --update-env || HOSTNAME=127.0.0.1 PORT=3000 pm2 start .next/standalone/server.js --name bma

            pm2 save
            pm2 list

            sleep 3

            echo "Checking private app port"
            ss -tln | grep '127.0.0.1:3000' || ss -tln | grep ':3000' || true

            echo "Checking Residential JSON"
            curl -I https://bookmyassets.com/data/Residential.json || true

            echo "Checking website"
            curl -I https://bookmyassets.com || true